augmentation:
  blur: 0.1
  brightness: 0.2
  contrast: 0.2
  enabled: true
  horizontal_flip: 0.5
  rotation: 15
  vertical_flip: 0.2
data:
  batch_size: 32
  dataset_path: data/raw
  image_size:
  - 224
  - 224
  num_workers: 4
  pin_memory: true
  processed_path: data/processed
  test_split: 0.15
  train_split: 0.7
  val_split: 0.15
device:
  device_id: 0
  use_cuda: true
logging:
  log_dir: logs
  save_frequency: 1
  use_tensorboard: true
  use_wandb: false
  save_every_epoch: true
  print_detailed_metrics: true
model:
  dropout: 0.2
  name: efficientnet_b0
  num_classes: 8
  pretrained: true
training:
  early_stopping_patience: 10
  epochs: 3
  learning_rate: 0.001
  optimizer: adam
  save_best_model: true
  scheduler: cosine
  weight_decay: 0.0001
